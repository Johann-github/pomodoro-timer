<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pomodoro Timer</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍅</text></svg>">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:      #1e1e1e;
  --bg2:     #2a2a2a;
  --bg3:     #2e2e2e;
  --fg:      #ffffff;
  --fg-dim:  #888888;
  --arc-bg:  #333333;
  --sep:     #333333;
  --accent:  #e74c3c;
  --accent-sel: #4a7fc1;
}
body.light {
  --bg:     #f0f0f0;
  --bg2:    #e2e2e2;
  --bg3:    #d0d0d0;
  --fg:     #1a1a1a;
  --fg-dim: #555555;
  --arc-bg: #bbbbbb;
  --sep:    #cccccc;
}

body {
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  background: var(--bg);
  color: var(--fg);
  min-height: 100dvh;
  display: flex;
  justify-content: center;
}
button { background: none; border: none; cursor: pointer; font-family: inherit; }

#app {
  width: 100%;
  max-width: 400px;
  min-height: 100dvh;
  background: var(--bg);
  display: flex;
  flex-direction: column;
  position: relative;
}

/* ── Header ── */
#header {
  display: grid;
  grid-template-columns: 36px 1fr 36px;
  align-items: center;
  padding: 14px 16px 4px;
  flex-shrink: 0;
}
#back-btn { font-size: 20px; color: var(--fg-dim); display: none; }
#back-btn:hover { color: var(--fg); }
#header h1 { text-align: center; font-size: 20px; font-weight: 700; color: var(--fg); }
#menu-btn { font-size: 20px; color: var(--fg-dim); justify-self: end; }
#menu-btn:hover { color: var(--fg); }

/* ── Notification bar ── */
#notif-bar {
  display: none;
  align-items: center;
  padding: 10px 14px;
  gap: 10px;
  flex-shrink: 0;
}
#notif-bar.visible { display: flex; }
#notif-msg { flex: 1; font-size: 14px; }
#notif-ok {
  padding: 6px 14px;
  border-radius: 4px;
  font-size: 13px;
  font-weight: 700;
  color: #fff;
  background: var(--accent);
  white-space: nowrap;
  flex-shrink: 0;
}

/* ── Hamburger overlay ── */
#menu-overlay {
  display: none;
  flex-direction: column;
  position: absolute;
  top: 52px;
  right: 16px;
  background: var(--bg2);
  border: 1px solid var(--sep);
  z-index: 200;
  min-width: 190px;
}
#menu-overlay.open { display: flex; }
#menu-overlay button {
  text-align: left;
  padding: 11px 18px;
  font-size: 14px;
  color: var(--fg);
}
#menu-overlay button:hover { background: var(--bg3); }

/* ── Pages ── */
.page { display: none; flex-direction: column; flex: 1; overflow: hidden; }
.page.active { display: flex; }

/* ── Main page ── */
.mode-label {
  text-align: center;
  color: var(--fg-dim);
  font-size: 13px;
  padding-top: 2px;
}
.timer-wrap {
  display: flex;
  justify-content: center;
  padding: 8px 0;
  position: relative;
  flex-shrink: 0;
}
.arc-bg { fill: none; stroke: var(--arc-bg); stroke-width: 10; }
.arc-progress {
  fill: none;
  stroke: var(--accent);
  stroke-width: 10;
  transition: stroke-dashoffset 0.9s linear, stroke 0.3s;
}
.timer-text {
  font-size: 44px;
  font-weight: 700;
  fill: var(--fg);
  cursor: pointer;
  user-select: none;
  font-family: 'Segoe UI', system-ui, sans-serif;
}
#time-edit-wrap {
  display: none;
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -42%);
  z-index: 10;
}
#time-edit-wrap.visible { display: block; }
#time-edit-input {
  width: 130px;
  font-size: 38px;
  font-weight: 700;
  text-align: center;
  background: var(--bg2);
  color: var(--accent);
  border: none;
  border-radius: 6px;
  padding: 4px 0;
  outline: none;
  font-family: inherit;
}

/* dots */
.dots-row {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 4px;
  flex-shrink: 0;
}
.adj-btn { font-size: 20px; font-weight: 700; color: var(--fg-dim); width: 30px; text-align: center; }
.adj-btn:hover { color: var(--fg); }
#dots-display { font-size: 18px; }

/* buttons */
.btn-row { display: flex; justify-content: center; gap: 16px; padding: 12px 0; flex-shrink: 0; }
.btn-primary {
  padding: 9px 14px;
  border-radius: 4px;
  font-size: 14px;
  font-weight: 700;
  color: #fff;
  background: var(--accent);
  min-width: 120px;
  text-align: center;
}
.btn-secondary {
  padding: 9px 14px;
  border-radius: 4px;
  font-size: 14px;
  font-weight: 700;
  color: #fff;
  background: #444;
  min-width: 85px;
  text-align: center;
}
.btn-secondary:hover { background: #555; }
.skip-row { display: flex; justify-content: center; padding-bottom: 4px; flex-shrink: 0; }
.btn-ghost { font-size: 14px; font-weight: 700; color: var(--fg-dim); padding: 4px 8px; }
.btn-ghost:hover { color: var(--fg); }

/* sep */
.sep { height: 1px; background: var(--sep); margin: 10px 20px 0; flex-shrink: 0; }

/* tasks */
.section-hdr {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 20px 6px;
  flex-shrink: 0;
}
.section-hdr h2 { font-size: 15px; font-weight: 700; }
.hdr-btn { font-size: 12px; color: var(--fg-dim); }
.hdr-btn:hover { color: var(--fg); }

.task-input-row {
  display: flex;
  gap: 8px;
  padding: 0 20px 8px;
  flex-shrink: 0;
}
.task-input-row input {
  flex: 1;
  background: var(--bg3);
  color: var(--fg);
  border: none;
  border-radius: 4px;
  padding: 8px 10px;
  font-size: 14px;
  outline: none;
  font-family: inherit;
}
.task-input-row input::placeholder { color: var(--fg-dim); }
.add-task-btn {
  padding: 0 16px;
  border-radius: 4px;
  font-size: 22px;
  font-weight: 700;
  color: #fff;
  background: var(--accent);
  display: flex;
  align-items: center;
  line-height: 1;
}
.task-list { flex: 1; overflow-y: auto; padding: 0 20px 12px; }
.task-item { display: flex; align-items: center; gap: 6px; padding: 4px 0; }
.task-item input[type="checkbox"] {
  width: 16px; height: 16px;
  cursor: pointer;
  accent-color: var(--accent);
  flex-shrink: 0;
}
.task-text { flex: 1; font-size: 14px; color: var(--fg); }
.task-item.done .task-text { color: var(--fg-dim); text-decoration: line-through; }
.arc-btn {
  font-size: 15px; color: var(--fg-dim);
  opacity: 0; pointer-events: none; transition: opacity 0.15s;
}
.task-item.done .arc-btn { opacity: 1; pointer-events: auto; }
.arc-btn:hover { color: #27ae60; }
.del-btn { font-size: 17px; color: var(--fg-dim); }
.del-btn:hover { color: var(--fg); }

/* ── Archive page ── */
.page-hdr {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 20px 8px;
  flex-shrink: 0;
}
.page-hdr h2 { font-size: 17px; font-weight: 700; }
.danger-btn { font-size: 12px; color: #e74c3c; }
.danger-btn:hover { color: #c0392b; }
.arc-list { flex: 1; overflow-y: auto; padding: 0 20px 12px; }
.arc-item { display: flex; align-items: center; gap: 8px; padding: 5px 0; }
.check-icon { color: #27ae60; font-size: 13px; flex-shrink: 0; }
.arc-text { flex: 1; font-size: 14px; color: var(--fg-dim); text-decoration: line-through; }
.empty-msg { color: var(--fg-dim); font-size: 14px; padding: 20px; text-align: center; }

/* ── Settings page ── */
.settings-scroll { flex: 1; overflow-y: auto; padding-bottom: 20px; }
.s-title {
  font-size: 12px; font-weight: 700; letter-spacing: .04em; text-transform: uppercase;
  color: var(--fg-dim); padding: 16px 20px 4px;
}
.s-sep { height: 1px; background: var(--sep); margin: 0 20px 8px; }
.s-label { font-size: 13px; color: var(--fg); padding: 6px 20px 2px; }
.s-input {
  display: block; width: 90px; margin: 0 20px;
  background: var(--bg3); border: none; border-radius: 4px;
  padding: 7px 10px; font-size: 16px; font-weight: 700;
  text-align: center; outline: none; font-family: inherit;
}
.sched-row { display: flex; gap: 6px; padding: 6px 20px; flex-wrap: wrap; }
.sched-btn {
  border-radius: 4px; font-size: 10px; font-weight: 700; color: #fff;
  width: 42px; height: 46px;
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px;
  border: none; cursor: pointer;
}
.color-rows { padding: 4px 20px; }
.color-row { display: flex; align-items: center; gap: 12px; padding: 5px 0; }
.color-row label { font-size: 13px; color: var(--fg); width: 130px; }
.color-row input[type="color"] {
  width: 38px; height: 30px;
  border: 2px solid var(--sep); border-radius: 4px;
  cursor: pointer; background: none; padding: 2px;
}
.toggle-row { display: flex; gap: 10px; padding: 6px 20px; }
.toggle-btn {
  padding: 7px 16px; border-radius: 4px;
  font-size: 13px; color: var(--fg-dim);
  background: var(--bg3); border: none; cursor: pointer;
  font-family: inherit;
}
.toggle-btn.active { background: var(--accent-sel); color: #fff; font-weight: 700; }

/* ── Pet ── */
.pet-area {
  display: flex;
  flex-direction: column;
  align-items: center;
  flex-shrink: 0;
  cursor: pointer;
  user-select: none;
  padding: 0 0 4px;
}
#pet-canvas { display: block; }
#pet-label {
  font-size: 11px;
  color: var(--fg-dim);
  margin-top: 1px;
  transition: color 0.15s;
}
.pet-area:hover #pet-label { color: var(--fg); }
</style>
</head>
<body>
<div id="app">

  <div id="header">
    <button id="back-btn">←</button>
    <h1>Pomodoro Timer</h1>
    <button id="menu-btn">☰</button>
  </div>

  <div id="notif-bar">
    <span id="notif-msg"></span>
    <button id="notif-ok">OK  ▶</button>
  </div>

  <div id="menu-overlay">
    <button id="menu-mute-btn"></button>
    <button id="menu-settings-btn"></button>
    <button id="menu-archive-btn"></button>
  </div>

  <!-- Main page -->
  <div id="page-main" class="page active">
    <div class="mode-label" id="mode-label"></div>

    <div class="timer-wrap" id="timer-wrap">
      <svg width="220" height="220" viewBox="0 0 220 220">
        <circle cx="110" cy="110" r="98" class="arc-bg"/>
        <circle cx="110" cy="110" r="98" class="arc-progress" id="arc-progress"
                transform="rotate(-90 110 110)"/>
        <text x="110" y="122" class="timer-text" text-anchor="middle"
              id="timer-display">25:00</text>
      </svg>
      <div id="time-edit-wrap">
        <input id="time-edit-input" type="number" min="1" max="99"/>
      </div>
    </div>

    <div class="dots-row">
      <button class="adj-btn" id="minus-btn">−</button>
      <span id="dots-display"></span>
      <button class="adj-btn" id="plus-btn">+</button>
    </div>

    <div class="btn-row">
      <button class="btn-primary" id="start-btn"></button>
      <button class="btn-secondary" id="reset-btn"></button>
    </div>

    <div class="skip-row">
      <button class="btn-ghost" id="skip-btn"></button>
    </div>

    <div class="pet-area" id="pet-area">
      <canvas id="pet-canvas" width="90" height="90"></canvas>
      <div id="pet-label"></div>
    </div>

    <div class="sep"></div>

    <div class="section-hdr">
      <h2 id="tasks-hdr"></h2>
      <button class="hdr-btn" id="archive-done-btn"></button>
    </div>

    <div class="task-input-row">
      <input type="text" id="task-input"/>
      <button class="add-task-btn" id="add-task-btn">+</button>
    </div>

    <div class="task-list" id="task-list"></div>
  </div>

  <!-- Archive page -->
  <div id="page-archive" class="page">
    <div class="page-hdr">
      <h2 id="archive-title-lbl"></h2>
      <button class="danger-btn" id="clear-archive-btn"></button>
    </div>
    <div class="sep" style="margin-top:0"></div>
    <div class="arc-list" id="arc-list"></div>
  </div>

  <!-- Settings page -->
  <div id="page-settings" class="page">
    <div class="settings-scroll" id="settings-inner"></div>
  </div>

</div>
<script>
// ─────────────────────────────────────────────── Constants
const CIRC = 2 * Math.PI * 98; // ≈ 615.75

const STR = {
  de: {
    work:'Arbeitszeit', short_break:'Kurze Pause', long_break:'Lange Pause',
    start:'▶  Start', pause:'⏸  Pause', resume:'▶  Fortsetzen',
    reset:'↺  Reset', skip:'⏭  Überspringen',
    tasks_hdr:'Aufgaben', archive_btn:'→ Archivieren',
    archive_title:'📦  Archiv', delete_all:'Alle löschen',
    no_archived:'Noch keine archivierten Aufgaben.',
    break_times:'Pausenzeiten',
    short_min:'Kurze Pause (Min)', long_min:'Lange Pause (Min)',
    break_schedule:'Pausenplan',
    colors_section:'Farben',
    color_work:'Arbeitszeit', color_short:'Kurze Pause', color_long:'Lange Pause',
    appearance:'Erscheinungsbild', dark_btn:'🌙  Dark', light_btn:'☀️  Light',
    language:'Sprache',
    done_long:'Lange Pause verdient! Gut gemacht.',
    done_short:'Kurze Pause verdient! Gleich weiter.',
    done_work:'Pause vorbei – zurück an die Arbeit!',
    ok_start:'OK  ▶',
    menu_mute:'🔔  Ton an/aus', menu_muted:'🔇  Ton (stumm)',
    menu_settings:'⚙️  Einstellungen', menu_archive:'📦  Archiv',
    task_placeholder:'Neue Aufgabe…',
    pet_cat:'🐱  Katze', pet_dog:'🐶  Hund',
  },
  en: {
    work:'Work Time', short_break:'Short Break', long_break:'Long Break',
    start:'▶  Start', pause:'⏸  Pause', resume:'▶  Resume',
    reset:'↺  Reset', skip:'⏭  Skip',
    tasks_hdr:'Tasks', archive_btn:'→ Archive',
    archive_title:'📦  Archive', delete_all:'Delete all',
    no_archived:'No archived tasks yet.',
    break_times:'Break Times',
    short_min:'Short Break (min)', long_min:'Long Break (min)',
    break_schedule:'Break Schedule',
    colors_section:'Colors',
    color_work:'Work Time', color_short:'Short Break', color_long:'Long Break',
    appearance:'Appearance', dark_btn:'🌙  Dark', light_btn:'☀️  Light',
    language:'Language',
    done_long:'Long break earned! Well done.',
    done_short:'Short break earned! Back soon.',
    done_work:'Break over – back to work!',
    ok_start:'OK  ▶',
    menu_mute:'🔔  Sound on/off', menu_muted:'🔇  Sound (muted)',
    menu_settings:'⚙️  Settings', menu_archive:'📦  Archive',
    task_placeholder:'New task…',
    pet_cat:'🐱  Cat', pet_dog:'🐶  Dog',
  },
};

// ─────────────────────────────────────────────── State
let state = {
  lang: 'de', theme: 'dark',
  mode: 'work', timeLeft: 25*60, cyclesDone: 0, cyclesMax: 4,
  breakSchedule: ['short_break','short_break','short_break','long_break'],
  muted: false,
  modes: {
    work:        { color:'#e74c3c', time:25*60 },
    short_break: { color:'#27ae60', time: 5*60 },
    long_break:  { color:'#2980b9', time:15*60 },
  },
  todos: [], archived: [],
  petType: 'cat',
};
let nextId = 1, timerInterval = null, notifTimeout = null, menuOpen = false;
let currentPage = 'main', timerPaused = false;

// ─────────────────────────────────────────────── Persistence
function save() {
  localStorage.setItem('pomodoro', JSON.stringify({
    ...state, nextId,
    running: false, // never restore as running
  }));
}
function load() {
  try {
    const d = JSON.parse(localStorage.getItem('pomodoro') || 'null');
    if (!d) return;
    if (['de','en'].includes(d.lang))       state.lang  = d.lang;
    if (['dark','light'].includes(d.theme)) state.theme = d.theme;
    if (d.mode && state.modes[d.mode])      state.mode  = d.mode;
    if (typeof d.timeLeft === 'number')     state.timeLeft = d.timeLeft;
    if (typeof d.cyclesDone === 'number')   state.cyclesDone = d.cyclesDone;
    if (typeof d.cyclesMax === 'number')    state.cyclesMax = Math.max(2, Math.min(8, d.cyclesMax));
    if (Array.isArray(d.breakSchedule) && d.breakSchedule.length === state.cyclesMax)
      state.breakSchedule = d.breakSchedule;
    if (typeof d.muted === 'boolean') state.muted = d.muted;
    if (d.modes) {
      for (const k of ['work','short_break','long_break']) {
        if (d.modes[k]?.color) state.modes[k].color = d.modes[k].color;
        if (d.modes[k]?.time)  state.modes[k].time  = d.modes[k].time;
      }
    }
    if (Array.isArray(d.todos))    state.todos    = d.todos;
    if (Array.isArray(d.archived)) state.archived = d.archived;
    if (typeof d.nextId === 'number') nextId = d.nextId;
    if (d.petType && ['cat','dog'].includes(d.petType)) state.petType = d.petType;
    // detect paused state
    timerPaused = state.timeLeft < state.modes[state.mode].time;
  } catch(e) {}
}

// ─────────────────────────────────────────────── Helpers
const s  = k => STR[state.lang][k] || k;
const $  = id => document.getElementById(id);
const fmt = sec => `${String(Math.floor(sec/60)).padStart(2,'0')}:${String(sec%60).padStart(2,'0')}`;

function setAccent(color) {
  document.documentElement.style.setProperty('--accent', color);
}
function dimBg(hex) {
  const r = parseInt(hex.slice(1,3),16),
        g = parseInt(hex.slice(3,5),16),
        b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},0.18)`;
}

// ─────────────────────────────────────────────── Theme / Lang
function applyTheme() {
  document.body.classList.toggle('light', state.theme === 'light');
}
function applyModeLang() {
  const ls = STR[state.lang];
  state.modes.work.label       = ls.work;
  state.modes.short_break.label = ls.short_break;
  state.modes.long_break.label  = ls.long_break;
}

// ─────────────────────────────────────────────── Pages
function showPage(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  $('page-' + name).classList.add('active');
  $('back-btn').style.display = name === 'main' ? 'none' : 'block';
  currentPage = name;
  if (name === 'archive')  renderArchive();
  if (name === 'settings') renderSettings();
}

// ─────────────────────────────────────────────── Display refresh
function refresh() {
  const m = state.modes[state.mode];
  const progress = state.modes[state.mode].time > 0
    ? state.timeLeft / state.modes[state.mode].time : 1;

  const arc = $('arc-progress');
  arc.style.strokeDasharray  = CIRC;
  arc.style.strokeDashoffset = CIRC * (1 - Math.max(0, Math.min(1, progress)));
  arc.style.stroke = m.color;
  setAccent(m.color);

  $('timer-display').textContent = fmt(state.timeLeft);
  $('mode-label').textContent    = m.label || s(state.mode);

  const filled = '●'.repeat(state.cyclesDone);
  const empty  = '○'.repeat(state.cyclesMax - state.cyclesDone);
  const dots   = $('dots-display');
  dots.textContent = filled + empty;
  dots.style.color = m.color;

  $('start-btn').style.background = m.color;
  $('add-task-btn').style.background = m.color;
  $('add-task-btn').style.activebackground = m.color;

  // start button label
  if (timerInterval)  $('start-btn').textContent = s('pause');
  else if (timerPaused) $('start-btn').textContent = s('resume');
  else                $('start-btn').textContent = s('start');

  document.title = `${fmt(state.timeLeft)} – ${m.label || s(state.mode)}`;
}

function applyAllLabels() {
  applyModeLang();
  $('reset-btn').textContent         = s('reset');
  $('skip-btn').textContent          = s('skip');
  $('tasks-hdr').textContent         = s('tasks_hdr');
  $('archive-done-btn').textContent  = s('archive_btn');
  $('archive-title-lbl').textContent = s('archive_title');
  $('clear-archive-btn').textContent = s('delete_all');
  $('task-input').placeholder        = s('task_placeholder');
  $('notif-ok').textContent          = s('ok_start');
  $('menu-settings-btn').textContent = s('menu_settings');
  $('menu-archive-btn').textContent  = s('menu_archive');
  $('menu-mute-btn').textContent     = state.muted ? s('menu_muted') : s('menu_mute');
  $('pet-label').textContent         = s(state.petType === 'cat' ? 'pet_cat' : 'pet_dog');
  refresh();
}

// ─────────────────────────────────────────────── Timer
function tick() {
  if (state.timeLeft > 0) {
    state.timeLeft--;
    refresh();
  } else {
    clearInterval(timerInterval);
    timerInterval = null;
    timerPaused   = false;
    sessionDone();
  }
}

function toggleTimer() {
  if (timerInterval) {
    clearInterval(timerInterval);
    timerInterval = null;
    timerPaused   = true;
    refresh();
  } else {
    timerPaused   = false;
    timerInterval = setInterval(tick, 1000);
    refresh();
  }
}

function resetTimer() {
  clearInterval(timerInterval);
  timerInterval = null;
  timerPaused   = false;
  state.timeLeft = state.modes[state.mode].time;
  refresh();
}

function skipTimer() {
  clearInterval(timerInterval);
  timerInterval = null;
  timerPaused   = false;
  state.timeLeft = 0;
  sessionDone();
}

function sessionDone() {
  beep();
  let msg;
  if (state.mode === 'work') {
    state.cyclesDone++;
    const idx = state.cyclesDone - 1;
    const bt  = idx < state.breakSchedule.length ? state.breakSchedule[idx] : 'long_break';
    state.mode = bt;
    msg = bt === 'long_break' ? s('done_long') : s('done_short');
    if (state.cyclesDone >= state.cyclesMax) state.cyclesDone = 0;
  } else {
    state.mode = 'work';
    msg = s('done_work');
  }
  state.timeLeft = state.modes[state.mode].time;
  refresh();
  if (currentPage !== 'main') showPage('main');
  showNotif(msg);
  save();
}

// ─────────────────────────────────────────────── Notification
function showNotif(msg) {
  if (notifTimeout) clearTimeout(notifTimeout);
  const bar   = $('notif-bar');
  const color = state.modes[state.mode].color;
  bar.style.background = dimBg(color);
  $('notif-msg').textContent = msg;
  $('notif-ok').style.background = color;
  bar.classList.add('visible');
  notifTimeout = setTimeout(notifOk, 6000);
}
function notifOk() {
  if (notifTimeout) { clearTimeout(notifTimeout); notifTimeout = null; }
  $('notif-bar').classList.remove('visible');
  if (!timerInterval) toggleTimer();
}

// ─────────────────────────────────────────────── Sound
function beep() {
  if (state.muted) return;
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    [[880,220],[660,180],[880,280]].forEach(([freq,dur], i) => {
      const osc = ctx.createOscillator(), gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.frequency.value = freq;
      const t0 = ctx.currentTime + i * 0.38;
      gain.gain.setValueAtTime(0.25, t0);
      gain.gain.exponentialRampToValueAtTime(0.001, t0 + dur/1000);
      osc.start(t0); osc.stop(t0 + dur/1000 + 0.05);
    });
  } catch(e) {}
}

// ─────────────────────────────────────────────── Pet helpers
function _ell(ctx,x,y,rx,ry,rot,f){ctx.beginPath();ctx.ellipse(x,y,rx,ry,rot,0,Math.PI*2);ctx.fillStyle=f;ctx.fill();}
function _circ(ctx,x,y,r,f){ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fillStyle=f;ctx.fill();}
function _poly(ctx,pts,f){ctx.beginPath();ctx.moveTo(pts[0],pts[1]);for(let i=2;i<pts.length;i+=2)ctx.lineTo(pts[i],pts[i+1]);ctx.closePath();ctx.fillStyle=f;ctx.fill();}
function _eyeClose(ctx,x,y,r,col){ctx.beginPath();ctx.arc(x,y,r,Math.PI*.08,Math.PI*.92);ctx.strokeStyle=col;ctx.lineWidth=1.8;ctx.lineCap='round';ctx.stroke();}
function _curve(ctx,x0,y0,cx1,cy1,cx2,cy2,x1,y1,col,w){ctx.beginPath();ctx.moveTo(x0,y0);ctx.bezierCurveTo(cx1,cy1,cx2,cy2,x1,y1);ctx.strokeStyle=col;ctx.lineWidth=w;ctx.lineCap='round';ctx.stroke();}
function _zzz(ctx,t,col){
  const p=(t%2400)/2400, al=Math.min(1,Math.min(p/.12,(1-p)/.12));
  if(al<.05)return;
  const ya=30-p*14;
  ctx.globalAlpha=al; ctx.fillStyle=col;
  ctx.font='bold 9px sans-serif';  ctx.fillText('z',55,ya+28);
  ctx.font='bold 11px sans-serif'; ctx.fillText('z',61,ya+16);
  ctx.font='bold 13px sans-serif'; ctx.fillText('Z',68,ya+2);
  ctx.globalAlpha=1;
}

// ─────────────────────────────────────────────── Pet
const PET = {
  raf: null,
  ps(){ return state.mode!=='work' ? 'sleep' : timerInterval ? 'play' : 'idle'; },
  start(){
    const cv=$('pet-canvas'); if(!cv)return;
    const ctx=cv.getContext('2d');
    const loop=ts=>{ this.draw(ctx,ts); this.raf=requestAnimationFrame(loop); };
    this.raf=requestAnimationFrame(loop);
  },
  draw(ctx,t){ ctx.clearRect(0,0,90,90); state.petType==='cat'?this.cat(ctx,t):this.dog(ctx,t); },

  cat(ctx,t){
    const ps=this.ps(), F='#8888aa', D='#56567a', P='#e088a0', cx=45;
    if(ps==='sleep'){
      _ell(ctx,50,70,22,11,0,F);
      _curve(ctx,70,65, 83,52, 80,74, 68,72, F,5);
      _circ(ctx,25,66,12,F);
      _poly(ctx,[17,58,19,48,25,57],F); _poly(ctx,[18,57,20,52,24,57],P);
      _eyeClose(ctx,21,66,3,D); _eyeClose(ctx,29,66,3,D);
      _zzz(ctx,t,D); return;
    }
    const bou=ps==='play'?-Math.abs(Math.sin(t*.007))*10:0;
    const br=Math.sin(t*.0018)*1.4, ta=Math.sin(t*.0012)*(ps==='play'?.68:.28);
    const blk=(t%3800)<160, fy=83+bou, hy=fy-37;
    // tail
    _curve(ctx,cx+16,fy-14, cx+38+ta*8,fy-32, cx+34+ta*8,fy-50, cx+22+ta*8,ps==='play'?fy-62:fy-55, F,5);
    // body
    _ell(ctx,cx,fy-15,16,11+br*.5,ps==='play'?-.14:0,F);
    // head
    _circ(ctx,cx,hy,13,F);
    // ears
    const eh=ps==='play'?19:17;
    _poly(ctx,[cx-14,hy-5, cx-10,hy-eh, cx-3,hy-7],F);
    _poly(ctx,[cx+3,hy-7,  cx+10,hy-eh, cx+14,hy-5],F);
    _poly(ctx,[cx-12,hy-6, cx-9,hy-eh+4, cx-5,hy-7],P);
    _poly(ctx,[cx+5,hy-7,  cx+9,hy-eh+4, cx+12,hy-6],P);
    // eyes
    const eo=ps==='play'?3.5:(blk?.5:2.8);
    _ell(ctx,cx-5,hy,2.5,eo,0,D); _ell(ctx,cx+5,hy,2.5,eo,0,D);
    if(!blk){
      ctx.fillStyle='rgba(255,255,255,.5)';
      ctx.beginPath();ctx.arc(cx-4,hy-1,.9,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.arc(cx+6,hy-1,.9,0,Math.PI*2);ctx.fill();
    }
    // nose + mouth
    _poly(ctx,[cx-2,hy+5, cx+2,hy+5, cx,hy+7],P);
    ctx.beginPath();
    ctx.moveTo(cx,hy+7);ctx.quadraticCurveTo(cx-4,hy+10,cx-5,hy+9);
    ctx.moveTo(cx,hy+7);ctx.quadraticCurveTo(cx+4,hy+10,cx+5,hy+9);
    ctx.strokeStyle=D;ctx.lineWidth=1.2;ctx.stroke();
    // paws
    if(ps==='play'){ _ell(ctx,cx-11,fy+2,6,4,-.4,F); _ell(ctx,cx+11,fy+2,6,4,.4,F); }
    else           { _ell(ctx,cx-9,fy,7,4.5,0,F);    _ell(ctx,cx+9,fy,7,4.5,0,F);   }
  },

  dog(ctx,t){
    const ps=this.ps(), F='#c8966e', D='#7a4e28', SN='#d4a880', cx=45;
    if(ps==='sleep'){
      _ell(ctx,50,70,22,11,0,F);
      _curve(ctx,70,64, 80,54, 78,72, 67,72, F,6);
      _circ(ctx,25,66,13,F);
      _ell(ctx,16,72,6,10,-.18,F); _ell(ctx,20,68,6,4,0,SN); _circ(ctx,18,67,2.5,D);
      _eyeClose(ctx,22,63,3,D); _eyeClose(ctx,30,63,3,D);
      _zzz(ctx,t,D); return;
    }
    const bou=ps==='play'?-Math.abs(Math.sin(t*.007))*10:0;
    const br=Math.sin(t*.0018)*1.4, tsp=ps==='play'?.012:.006;
    const ta=Math.sin(t*tsp)*(ps==='play'?1.1:.44);
    const blk=(t%4000)<180, fy=83+bou, hy=fy-38;
    // tail
    _curve(ctx,cx+17,fy-16, cx+28+ta*10,fy-28, cx+26+ta*10,fy-40, cx+18+ta*8,fy-42, F,6);
    // body
    _ell(ctx,cx,fy-16,17,12+br*.5,0,F);
    // head
    _circ(ctx,cx,hy,15,F);
    // floppy ears
    _ell(ctx,cx-18,hy+5,7,11,-.08,F); _ell(ctx,cx+18,hy+5,7,11,.08,F);
    ctx.globalAlpha=.1; _ell(ctx,cx-18,hy+5,5,9,-.08,'#000'); _ell(ctx,cx+18,hy+5,5,9,.08,'#000'); ctx.globalAlpha=1;
    // snout
    _ell(ctx,cx,hy+6,7,5,0,SN);
    // eyes
    const eo=ps==='play'?4:(blk?.5:3.5);
    _ell(ctx,cx-6,hy-3,3,eo,0,D); _ell(ctx,cx+6,hy-3,3,eo,0,D);
    if(!blk){
      ctx.fillStyle='rgba(255,255,255,.5)';
      ctx.beginPath();ctx.arc(cx-5,hy-4,1.1,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.arc(cx+7,hy-4,1.1,0,Math.PI*2);ctx.fill();
    }
    // nose
    _ell(ctx,cx,hy+4,3.5,2.5,0,D);
    // paws
    if(ps==='play'){ _ell(ctx,cx-12,fy+3,7,4,-.5,F); _ell(ctx,cx+12,fy+3,7,4,.5,F); }
    else           { _ell(ctx,cx-10,fy+1,7,5,0,F);   _ell(ctx,cx+10,fy+1,7,5,0,F);  }
  },
};

// ─────────────────────────────────────────────── Cycles
function adjustCycles(delta) {
  const nv = state.cyclesMax + delta;
  if (nv < 2 || nv > 8) return;
  const old = state.breakSchedule.slice();
  state.cyclesMax = nv;
  state.breakSchedule = nv > old.length
    ? old.concat(Array(nv - old.length).fill('short_break'))
    : old.slice(0, nv);
  if (state.cyclesDone >= state.cyclesMax) state.cyclesDone = 0;
  refresh(); save();
}

// ─────────────────────────────────────────────── Inline time edit
function openTimeEdit() {
  if (timerInterval) return;
  const inp = $('time-edit-input');
  inp.style.color = state.modes[state.mode].color;
  inp.value = Math.floor(state.modes[state.mode].time / 60);
  $('time-edit-wrap').classList.add('visible');
  $('timer-display').style.opacity = '0';
  inp.select(); inp.focus();
}
function closeTimeEdit(confirm) {
  if (confirm) {
    const v = parseInt($('time-edit-input').value);
    if (v >= 1 && v <= 99) {
      state.modes[state.mode].time = v * 60;
      state.timeLeft = v * 60;
      timerPaused = false;
      save(); refresh();
    }
  }
  $('time-edit-wrap').classList.remove('visible');
  $('timer-display').style.opacity = '1';
}

// ─────────────────────────────────────────────── Tasks
function addTask(text) {
  text = text.trim();
  if (!text) return;
  state.todos.push({ id: nextId++, text, done: false });
  renderTasks(); save();
}
function toggleTask(id) {
  const t = state.todos.find(t => t.id === id);
  if (t) { t.done = !t.done; renderTasks(); save(); }
}
function removeTask(id) {
  state.todos = state.todos.filter(t => t.id !== id);
  renderTasks(); save();
}
function archiveSingle(id) {
  const t = state.todos.find(t => t.id === id);
  if (t?.done) {
    state.archived.push({ id: nextId++, text: t.text });
    state.todos = state.todos.filter(t => t.id !== id);
    renderTasks(); save();
  }
}
function archiveDone() {
  state.todos = state.todos.filter(t => {
    if (t.done) { state.archived.push({ id: nextId++, text: t.text }); return false; }
    return true;
  });
  renderTasks(); save();
}
function renderTasks() {
  const list = $('task-list');
  list.innerHTML = '';
  state.todos.forEach(t => {
    const row = document.createElement('div');
    row.className = 'task-item' + (t.done ? ' done' : '');

    const cb = document.createElement('input');
    cb.type = 'checkbox'; cb.checked = t.done;
    cb.addEventListener('change', () => toggleTask(t.id));

    const lbl = document.createElement('span');
    lbl.className = 'task-text'; lbl.textContent = t.text;

    const arc = document.createElement('button');
    arc.className = 'arc-btn'; arc.textContent = '→';
    arc.addEventListener('click', () => archiveSingle(t.id));

    const del = document.createElement('button');
    del.className = 'del-btn'; del.textContent = '×';
    del.addEventListener('click', () => removeTask(t.id));

    row.append(cb, lbl, arc, del);
    list.appendChild(row);
  });
}

// ─────────────────────────────────────────────── Archive
function renderArchive() {
  const list = $('arc-list');
  list.innerHTML = '';
  if (!state.archived.length) {
    list.innerHTML = `<p class="empty-msg">${s('no_archived')}</p>`; return;
  }
  state.archived.forEach(a => {
    const row = document.createElement('div');
    row.className = 'arc-item';
    const icon = document.createElement('span'); icon.className = 'check-icon'; icon.textContent = '✓';
    const txt  = document.createElement('span'); txt.className  = 'arc-text';   txt.textContent  = a.text;
    const del  = document.createElement('button'); del.className = 'del-btn'; del.textContent = '×';
    del.addEventListener('click', () => {
      state.archived = state.archived.filter(x => x.id !== a.id);
      renderArchive(); save();
    });
    row.append(icon, txt, del);
    list.appendChild(row);
  });
}

// ─────────────────────────────────────────────── Settings
function renderSettings() {
  const c = $('settings-inner');
  c.innerHTML = '';

  const sec = title => {
    const t = document.createElement('div'); t.className = 's-title'; t.textContent = title;
    const d = document.createElement('div'); d.className = 's-sep';
    c.append(t, d);
  };

  // Pausenzeiten
  sec(s('break_times'));
  [['short_break','short_min'],['long_break','long_min']].forEach(([key, lk]) => {
    const lbl = document.createElement('div'); lbl.className = 's-label'; lbl.textContent = s(lk);
    const inp = document.createElement('input');
    inp.type = 'number'; inp.className = 's-input'; inp.min = 1; inp.max = 99;
    inp.value = Math.floor(state.modes[key].time / 60);
    inp.style.color = state.modes[key].color;
    const save_ = () => {
      const v = parseInt(inp.value);
      if (v >= 1 && v <= 99) {
        state.modes[key].time = v * 60;
        if (state.mode === key && !timerInterval && !timerPaused) {
          state.timeLeft = v * 60; refresh();
        }
        save();
      }
    };
    inp.addEventListener('change', save_);
    inp.addEventListener('blur', save_);
    c.append(lbl, inp);
  });

  // Break schedule
  const schedSep = document.createElement('div');
  schedSep.style.cssText = 'height:1px;background:var(--sep);margin:10px 20px 0';
  const schedLbl = document.createElement('div');
  schedLbl.style.cssText = 'font-size:12px;color:var(--fg-dim);padding:6px 20px 4px';
  schedLbl.textContent = s('break_schedule');
  const schedRow = document.createElement('div'); schedRow.className = 'sched-row';

  state.breakSchedule.forEach((bt, i) => {
    const btn = document.createElement('button'); btn.className = 'sched-btn';
    const update = () => {
      const short = state.breakSchedule[i] === 'short_break';
      btn.style.background = short ? '#27ae60' : '#2980b9';
      btn.innerHTML = (short ? '🟢' : '🔵') + `<span style="font-size:11px">${i+1}</span>`;
    };
    update();
    btn.addEventListener('click', () => {
      state.breakSchedule[i] = state.breakSchedule[i] === 'short_break' ? 'long_break' : 'short_break';
      update(); save();
    });
    schedRow.appendChild(btn);
  });
  c.append(schedSep, schedLbl, schedRow);

  // Farben
  sec(s('colors_section'));
  const colorRows = document.createElement('div'); colorRows.className = 'color-rows';
  [['work','color_work'],['short_break','color_short'],['long_break','color_long']].forEach(([key,lk]) => {
    const row = document.createElement('div'); row.className = 'color-row';
    const lbl = document.createElement('label'); lbl.textContent = s(lk);
    const inp = document.createElement('input'); inp.type = 'color'; inp.value = state.modes[key].color;
    inp.addEventListener('input', () => { state.modes[key].color = inp.value; refresh(); save(); });
    row.append(lbl, inp); colorRows.appendChild(row);
  });
  c.appendChild(colorRows);

  // Erscheinungsbild
  sec(s('appearance'));
  const appRow = document.createElement('div'); appRow.className = 'toggle-row';
  [['dark','dark_btn'],['light','light_btn']].forEach(([val, lk]) => {
    const btn = document.createElement('button');
    btn.className = 'toggle-btn' + (state.theme === val ? ' active' : '');
    btn.textContent = s(lk);
    btn.addEventListener('click', () => { state.theme = val; applyTheme(); save(); renderSettings(); });
    appRow.appendChild(btn);
  });
  c.appendChild(appRow);

  // Sprache
  sec(s('language'));
  const langRow = document.createElement('div'); langRow.className = 'toggle-row';
  [['de','🇩🇪  Deutsch'],['en','🇬🇧  English']].forEach(([val, label]) => {
    const btn = document.createElement('button');
    btn.className = 'toggle-btn' + (state.lang === val ? ' active' : '');
    btn.textContent = label;
    btn.addEventListener('click', () => {
      state.lang = val; applyAllLabels(); save(); renderSettings();
    });
    langRow.appendChild(btn);
  });
  c.appendChild(langRow);
}

// ─────────────────────────────────────────────── Hamburger
function closeMenu() { menuOpen = false; $('menu-overlay').classList.remove('open'); }
function toggleMenu() {
  menuOpen = !menuOpen;
  $('menu-overlay').classList.toggle('open', menuOpen);
  if (menuOpen) $('menu-mute-btn').textContent = state.muted ? s('menu_muted') : s('menu_mute');
}

// ─────────────────────────────────────────────── Boot
load(); applyTheme(); applyAllLabels(); renderTasks(); PET.start();

// ─────────────────────────────────────────────── Events
$('back-btn').addEventListener('click', () => showPage('main'));
$('menu-btn').addEventListener('click', e => { e.stopPropagation(); toggleMenu(); });
document.addEventListener('click', e => {
  if (menuOpen && !$('menu-overlay').contains(e.target)) closeMenu();
});

$('menu-mute-btn').addEventListener('click', () => {
  state.muted = !state.muted;
  $('menu-mute-btn').textContent = state.muted ? s('menu_muted') : s('menu_mute');
  save(); closeMenu();
});
$('menu-settings-btn').addEventListener('click', () => { closeMenu(); showPage('settings'); });
$('menu-archive-btn').addEventListener('click',  () => { closeMenu(); showPage('archive');  });

$('start-btn').addEventListener('click', toggleTimer);
$('reset-btn').addEventListener('click', resetTimer);
$('skip-btn').addEventListener('click',  skipTimer);
$('minus-btn').addEventListener('click', () => adjustCycles(-1));
$('plus-btn').addEventListener('click',  () => adjustCycles(+1));

$('timer-display').addEventListener('click', openTimeEdit);
$('time-edit-input').addEventListener('keydown', e => {
  if (e.key === 'Enter')  { closeTimeEdit(true);  }
  if (e.key === 'Escape') { closeTimeEdit(false); }
});
$('time-edit-input').addEventListener('blur', () => closeTimeEdit(true));

$('add-task-btn').addEventListener('click', () => {
  const inp = $('task-input'); addTask(inp.value); inp.value = '';
});
$('task-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') { addTask(e.target.value); e.target.value = ''; }
});
$('archive-done-btn').addEventListener('click', archiveDone);
$('clear-archive-btn').addEventListener('click', () => { state.archived = []; renderArchive(); save(); });
$('notif-ok').addEventListener('click', notifOk);

$('pet-area').addEventListener('click', () => {
  state.petType = state.petType === 'cat' ? 'dog' : 'cat';
  $('pet-label').textContent = s(state.petType === 'cat' ? 'pet_cat' : 'pet_dog');
  save();
});
</script>
